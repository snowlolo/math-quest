<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HW Helper</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="theme.css" />
  <script src="theme.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; color: var(--text);
    }
    #header {
      width: 100%; max-width: 700px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    #left-header { display: flex; align-items: center; gap: 12px; }
    #back-btn {
      background: transparent; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-tertiary); font-family: inherit;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      padding: 7px 13px; cursor: pointer; text-decoration: none;
    }
    #back-btn:hover { border-color: var(--blue); color: var(--blue); }
    #game-title { font-size: 0.95rem; font-weight: 900; letter-spacing: -0.3px; color: var(--text); }
    #mode-badge {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-tertiary); border: 1px solid var(--border); border-radius: 6px; padding: 3px 9px;
    }
    #right-header { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    #player-name { font-size: 0.65rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text-tertiary); }
    #score-display { font-size: 1.25rem; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }
    #question-counter { font-size: 1rem; font-weight: 800; color: var(--text); letter-spacing: -0.3px; display: none; }
    #streak-display { font-size: 0.72rem; font-weight: 700; color: var(--text-tertiary); letter-spacing: 1px; display: none; }
    #timer-bar-wrap {
      width: 100%; max-width: 700px;
      background: var(--surface-raised); border-radius: 3px; height: 4px;
      margin-bottom: 20px; overflow: hidden;
    }
    #timer-bar { height: 100%; width: 100%; background: var(--accent); border-radius: 2px; transition: width 0.1s linear; }
    #question-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 36px 32px; width: 100%; max-width: 700px;
      text-align: center;
    }
    #topic-badge {
      display: inline-block; background: var(--blue-muted); color: var(--blue);
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 3px; border: 1px solid var(--blue);
      border-radius: 100px; padding: 5px 14px; margin-bottom: 24px;
      opacity: 0.85;
    }
    #question-text {
      font-size: 2rem; font-weight: 800; line-height: 1.35;
      margin-bottom: 32px; min-height: 60px; letter-spacing: -0.5px;
    }
    #typed-area { display: flex; gap: 10px; margin-bottom: 24px; justify-content: center; flex-wrap: wrap; }
    #typed-input {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: inherit; font-size: 1.1rem; font-weight: 700;
      padding: 13px 18px; width: 220px; text-align: center; outline: none;
    }
    #typed-input::placeholder { color: var(--text-quaternary); }
    #typed-input:focus { border-color: var(--text-tertiary); }
    #submit-btn {
      background: var(--accent); border: none; border-radius: 8px; color: var(--accent-text);
      font-family: inherit; font-size: 0.75rem; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 13px 32px; cursor: pointer;
      transition: background 0.12s, transform 0.08s;
    }
    #submit-btn:active { transform: scale(0.98); }
    #submit-btn:hover { background: var(--accent-hover); }
    #hint-btn {
      background: transparent; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-quaternary); font-family: inherit; font-size: 0.68rem;
      font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      padding: 8px 16px; cursor: pointer; margin-bottom: 14px;
    }
    #hint-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-muted); }
    #hint-text {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-secondary); font-size: 0.88rem;
      padding: 14px 18px; margin-bottom: 14px; display: none; text-align: left; line-height: 1.6;
    }
    /* ── Multiple choice ── */
    #choices { display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
    .choice-btn {
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text-dim); font-family: inherit;
      font-size: 1rem; font-weight: 700; padding: 16px 12px; cursor: pointer;
      text-align: center; letter-spacing: -0.2px;
      transition: border-color 0.15s, background 0.15s, transform 0.08s;
    }
    .choice-btn:hover { border-color: var(--accent); background: var(--accent-muted); color: var(--text); transform: translateY(-1px); }
    .choice-btn:active { transform: translateY(0); }
    .choice-btn:disabled { cursor: default; transform: none; }
    .choice-btn.correct { background: rgba(22, 163, 74, 0.12); border-color: #16a34a; color: #16a34a; font-weight: 800; }
    .choice-btn.wrong   { background: rgba(220, 38, 38, 0.08); border-color: #dc2626; color: var(--text-tertiary); }

    #next-btn {
      width: 100%; background: var(--accent); border: none; border-radius: 8px; color: var(--accent-text);
      font-family: inherit; font-size: 0.75rem; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 15px; cursor: pointer; margin-top: 4px; display: none;
    }
    #next-btn:hover { background: var(--accent-hover); }
    #feedback {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.75); z-index: 10;
      backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    }
    #feedback-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 44px 52px;
      text-align: center; animation: popIn 0.17s ease; min-width: 280px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }
    @keyframes popIn { from { transform: scale(0.88); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    #feedback-label  { font-size: 1.7rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 10px; color: var(--text); }
    #feedback-points { font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 6px; font-weight: 600; }
    #feedback-total  { font-size: 0.78rem; color: var(--text-tertiary); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .feedback-correct #feedback-label { color: #16a34a; }
    .feedback-wrong   #feedback-label { color: #dc2626; }
    #test-results {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      background: var(--bg); z-index: 20;
    }
    #results-box { text-align: center; max-width: 360px; padding: 20px; }
    #results-grade {
      font-size: 9rem; font-weight: 900; letter-spacing: -6px;
      color: var(--text); line-height: 1; margin-bottom: 20px;
    }
    #results-fraction {
      font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; color: var(--text); margin-bottom: 6px;
    }
    #results-pct {
      font-size: 0.78rem; font-weight: 700; color: var(--text-tertiary);
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px;
    }
    #results-msg {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--text-quaternary); margin-bottom: 48px;
    }
    #results-actions { display: flex; gap: 10px; justify-content: center; }
    #results-actions button {
      background: transparent; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-tertiary);
      font-family: inherit; font-size: 0.68rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 13px 20px; cursor: pointer;
    }
    #results-actions .btn-primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    #results-actions .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    #results-actions .btn-secondary:hover { border-color: var(--text-tertiary); color: var(--text-secondary); }
  </style>
</head>
<body>
  <div id="header">
    <div id="left-header">
      <a id="back-btn" href="menu.html">Menu</a>
      <div id="game-title">HW Helper</div>
      <div id="mode-badge"></div>
    </div>
    <div id="right-header">
      <div id="player-name"></div>
      <div id="score-display"><span id="score-number">0</span> pts</div>
      <div id="question-counter">Q <span id="q-current">1</span> / 20</div>
      <div id="streak-display">Streak <span id="streak-num">0</span></div>
    </div>
  </div>

  <div id="timer-bar-wrap"><div id="timer-bar"></div></div>

  <div id="question-card">
    <div id="topic-badge">Loading...</div>
    <div id="question-text">Get ready!</div>
    <div id="choices"></div>
    <div id="typed-area">
      <input id="typed-input" type="text" placeholder="Your answer..." autocomplete="off" />
      <button id="submit-btn" onclick="handleTypedSubmit()">Submit</button>
    </div>
    <button id="hint-btn" onclick="handleHint()">Hint  &ndash;300 pts</button>
    <div id="hint-text"></div>
    <button id="next-btn" onclick="loadNextQuestion()">Next Question</button>
  </div>

  <div id="feedback">
    <div id="feedback-box">
      <div id="feedback-label"></div>
      <div id="feedback-points"></div>
      <div id="feedback-total"></div>
    </div>
  </div>

  <div id="test-results">
    <div id="results-box">
      <div id="results-grade"></div>
      <div id="results-fraction"></div>
      <div id="results-pct"></div>
      <div id="results-msg"></div>
      <div id="results-actions">
        <button class="btn-primary" onclick="location.href='menu.html'">Play Again</button>
        <button class="btn-secondary" onclick="location.href='leaderboard.html'">Leaderboard</button>
      </div>
    </div>
  </div>

  <script src="scoring.js"></script>
  <script src="hints.js"></script>
  <script src="questionGenerator.js"></script>
  <script src="questionGeneratorHard.js"></script>
  <script>
    var MODE_CONFIGS = {
      classic:  { timeLimit: 30, hints: true,  label: "Classic"  },
      accuracy: { timeLimit: 0,  hints: true,  label: "Accuracy" },
      test:     { timeLimit: 0,  hints: false, label: "Test"     },
      practice: { timeLimit: 0,  hints: true,  label: "Practice" },
      hard:     { timeLimit: 15, hints: false, label: "Hard"     },
    };

    var mode = localStorage.getItem("mathGameMode") || "classic";
    var cfg  = MODE_CONFIGS[mode] || MODE_CONFIGS.classic;

    var storedCount   = parseInt(localStorage.getItem("mathGameQuestionCount") || "0");
    var maxQ          = storedCount > 0 ? storedCount : 0;

    var currentQuestion = null;
    var timerInterval   = null;
    var TIME_LIMIT      = cfg.timeLimit > 0 ? cfg.timeLimit : 30;
    var timeLeft        = TIME_LIMIT;
    var answered        = false;
    var questionCount   = 0;
    var streak          = 0;
    var totalCorrect    = 0;

    // ── Init ─────────────────────────────────────────────────────────────────

    function startGame() {
      document.getElementById("player-name").textContent = getCurrentPlayer();
      document.getElementById("mode-badge").textContent  = cfg.label;

      if (cfg.timeLimit === 0) {
        document.getElementById("timer-bar-wrap").style.display = "none";
      }
      if (!cfg.hints) {
        document.getElementById("hint-btn").style.display = "none";
      } else if (mode === "practice") {
        document.getElementById("hint-btn").textContent = "Hint  (free)";
      }
      if (mode === "test" || mode === "practice") {
        document.getElementById("score-display").style.display = "none";
      }
      if (maxQ > 0) {
        document.getElementById("question-counter").style.display = "block";
      }
      if (mode === "accuracy") {
        document.getElementById("streak-display").style.display = "block";
      }

      updateScoreDisplay();
      loadNextQuestion();
    }

    // ── Question flow ─────────────────────────────────────────────────────────

    function loadNextQuestion() {
      answered = false;
      questionCount++;
      currentQuestion = mode === "hard" ? getHardQuestion() : getQuestion();
      resetHint();

      document.getElementById("topic-badge").textContent     = currentQuestion.topic.toUpperCase();
      document.getElementById("question-text").textContent   = currentQuestion.question;
      document.getElementById("hint-text").style.display     = "none";
      document.getElementById("hint-text").textContent       = "";
      document.getElementById("next-btn").style.display      = "none";

      if (maxQ > 0) {
        document.getElementById("question-counter").textContent = "Q " + questionCount + " / " + maxQ;
      }

      if (currentQuestion.distractors) { showMultipleChoice(); } else { showTypedInput(); }

      if (cfg.timeLimit > 0) { startCountdown(); }
      startTimer();
    }

    function showMultipleChoice() {
      document.getElementById("typed-area").style.display = "none";
      var div = document.getElementById("choices");
      div.style.display = "grid";
      div.innerHTML = "";
      var options = currentQuestion.distractors.concat([String(currentQuestion.answer)]);
      shuffleArray(options);
      options.forEach(function(opt) {
        var btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = opt;
        btn.onclick = (function(b, o) { return function() { handleChoiceClick(b, o); }; })(btn, opt);
        div.appendChild(btn);
      });
    }

    function handleChoiceClick(btn, chosen) {
      if (answered) return;
      answered = true;
      stopCountdown();
      document.querySelectorAll(".choice-btn").forEach(function(b) {
        b.disabled = true;
        var isCorrect = b.textContent.trim() === String(currentQuestion.answer).trim();
        b.classList.add(isCorrect ? "correct" : "wrong");
      });
      handleAnswerResult(gradeAnswer(chosen));
    }

    function showTypedInput() {
      var choicesDiv = document.getElementById("choices");
      choicesDiv.style.display = "none";
      choicesDiv.innerHTML = "";
      document.getElementById("typed-area").style.display = "flex";
      var inp = document.getElementById("typed-input");
      inp.value = "";
      inp.focus();
    }

    function handleTypedSubmit() {
      if (answered) return;
      var inp = document.getElementById("typed-input");
      if (!inp.value.trim()) return;
      answered = true;
      stopCountdown();
      handleAnswerResult(gradeAnswer(inp.value.trim()));
    }

    document.getElementById("typed-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") handleTypedSubmit();
    });

    // ── Grading ───────────────────────────────────────────────────────────────

    function normalizeAnswer(s) {
      return String(s).trim().toLowerCase()
        .replace(/\s+/g, '')
        .replace(/cm2/g, 'cm²').replace(/cm3/g, 'cm³')
        .replace(/m2/g,  'm²' ).replace(/m3/g,  'm³');
    }

    function gradeAnswer(playerAnswer) {
      var timeTaken = (Date.now() - questionStartTime) / 1000;
      var correct   = normalizeAnswer(playerAnswer) === normalizeAnswer(currentQuestion.answer);
      var pts       = 0;

      if (mode === "classic" || mode === "hard") {
        if (correct) { pts = calculatePoints(timeTaken); addToScore(pts); }

      } else if (mode === "accuracy") {
        if (correct) {
          streak++;
          pts = Math.min(streak, 5) * 200;
          addToScore(pts);
        } else {
          streak = 0;
        }
        document.getElementById("streak-num").textContent = streak;

      }
      if (correct) totalCorrect++;
      // practice / test: no per-question score added

      return {
        correct: correct,
        pointsEarned: pts,
        timeTaken: Math.round(timeTaken * 10) / 10,
        totalScore: getTotalScore(),
      };
    }

    // ── Hint ─────────────────────────────────────────────────────────────────

    function handleHint() {
      var div = document.getElementById("hint-text");
      if (mode === "practice") {
        div.textContent = currentQuestion.hint;
        div.style.display = "block";
      } else {
        var r = useHint(currentQuestion.hint);
        div.textContent = r.hint;
        div.style.display = "block";
        if (!r.alreadyUsed) updateScoreDisplay();
      }
    }

    // ── Answer result dispatch ────────────────────────────────────────────────

    function handleAnswerResult(result) {
      updateScoreDisplay();

      if (mode === "practice") {
        var div = document.getElementById("hint-text");
        var prefix = result.correct
          ? "Correct.  "
          : "Incorrect. The answer was: " + currentQuestion.answer + ".  ";
        div.textContent = prefix + currentQuestion.hint;
        div.style.display = "block";
        document.getElementById("next-btn").style.display = "block";
        if (maxQ > 0 && questionCount >= maxQ) {
          document.getElementById("next-btn").textContent = "See Results";
          document.getElementById("next-btn").onclick = showSessionEnd;
        }
        return;
      }

      var isLast = maxQ > 0 && questionCount >= maxQ;
      showFeedback(result, isLast);
    }

    // ── Feedback overlay ──────────────────────────────────────────────────────

    function showFeedback(result, isLast) {
      var box = document.getElementById("feedback-box");
      document.getElementById("feedback-label").textContent = result.correct ? "Correct!" : "Not quite!";

      if (mode === "test" || mode === "practice") {
        document.getElementById("feedback-points").textContent = result.correct
          ? "Correct"
          : "Answer: " + currentQuestion.answer;
        document.getElementById("feedback-total").textContent = totalCorrect + " correct so far";
      } else {
        document.getElementById("feedback-points").textContent = result.correct
          ? "+" + result.pointsEarned + " pts  (" + result.timeTaken + "s)"
          : "Answer: " + currentQuestion.answer;
        document.getElementById("feedback-total").textContent = "Total: " + result.totalScore.toLocaleString() + " pts";
      }

      box.className = result.correct ? "feedback-correct" : "feedback-wrong";
      document.getElementById("feedback").style.display = "flex";

      setTimeout(function() {
        document.getElementById("feedback").style.display = "none";
        if (isLast) { showSessionEnd(); } else { loadNextQuestion(); }
      }, isLast ? 1200 : 2000);
    }

    // ── Session end (all modes) ───────────────────────────────────────────────

    function showSessionEnd() {
      var total = questionCount;
      var pct   = total > 0 ? Math.round(totalCorrect / total * 100) : 0;

      if (mode === "test") {
        var grade = pct >= 90 ? "A" : pct >= 80 ? "B" : pct >= 70 ? "C" : pct >= 60 ? "D" : "F";
        var msgs  = { A: "Outstanding.", B: "Great work.", C: "Good effort.", D: "Keep practicing.", F: "Don't give up." };
        document.getElementById("results-grade").textContent    = grade;
        document.getElementById("results-fraction").textContent = totalCorrect + " / " + total;
        document.getElementById("results-pct").textContent      = pct + "%";
        document.getElementById("results-msg").textContent      = msgs[grade];
        // Save test score to leaderboard
        var scores = JSON.parse(localStorage.getItem("mathGameAllScores") || "{}");
        var player = getCurrentPlayer();
        scores[player] = (scores[player] || 0) + totalCorrect * 100;
        localStorage.setItem("mathGameAllScores", JSON.stringify(scores));

      } else if (mode === "practice") {
        document.getElementById("results-grade").textContent    = pct + "%";
        document.getElementById("results-fraction").textContent = totalCorrect + " / " + total + " correct";
        document.getElementById("results-pct").textContent      = "practice complete";
        document.getElementById("results-msg").textContent      = "";

      } else {
        document.getElementById("results-grade").textContent    = getTotalScore().toLocaleString();
        document.getElementById("results-fraction").textContent = totalCorrect + " / " + total + " correct";
        document.getElementById("results-pct").textContent      = pct + "% accuracy";
        document.getElementById("results-msg").textContent      = cfg.label + " complete";
      }

      document.getElementById("test-results").style.display = "flex";
    }

    // ── Timer ─────────────────────────────────────────────────────────────────

    function startCountdown() {
      timeLeft = TIME_LIMIT;
      updateTimerBar();
      timerInterval = setInterval(function() {
        timeLeft -= 0.1;
        if (timeLeft <= 0) {
          timeLeft = 0;
          updateTimerBar();
          if (!answered) {
            answered = true;
            stopCountdown();
            handleAnswerResult(gradeAnswer(""));
          }
        } else {
          updateTimerBar();
        }
      }, 100);
    }

    function stopCountdown() { clearInterval(timerInterval); }

    function updateTimerBar() {
      var pct = (timeLeft / TIME_LIMIT) * 100;
      var bar = document.getElementById("timer-bar");
      bar.style.width = pct + "%";
      bar.style.background = pct > 20 ? "var(--accent)" : "var(--text-tertiary)";
    }

    // ── Helpers ───────────────────────────────────────────────────────────────

    function updateScoreDisplay() {
      document.getElementById("score-number").textContent = getTotalScore().toLocaleString();
    }

    function shuffleArray(arr) {
      for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
      }
    }

    startGame();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Quest - Leaderboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #1a1a6e, #3b0f8c, #6a0dad);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
      color: white;
    }
    #header {
      width: 100%; max-width: 600px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 28px;
    }
    #back-btn {
      background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
      border-radius: 10px; color: white; font-size: 0.9rem; font-weight: 600;
      padding: 6px 14px; cursor: pointer; text-decoration: none;
      transition: background 0.15s;
    }
    #back-btn:hover { background: rgba(255,255,255,0.25); }
    h1 { font-size: 2rem; font-weight: 900; color: #ffe566; text-shadow: 2px 2px 0 #b8860b; }
    .card {
      background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.25);
      border-radius: 24px; padding: 32px 28px; width: 100%; max-width: 600px;
      backdrop-filter: blur(8px); box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .empty {
      text-align: center; color: rgba(255,255,255,0.5);
      font-size: 1rem; padding: 40px 0;
    }
    .row {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 16px; border-radius: 14px; margin-bottom: 10px;
      background: rgba(255,255,255,0.08);
      transition: background 0.15s;
    }
    .row:hover { background: rgba(255,255,255,0.14); }
    .row.gold   { background: rgba(255,215,0,0.18); border: 1px solid rgba(255,215,0,0.4); }
    .row.silver { background: rgba(192,192,192,0.15); border: 1px solid rgba(192,192,192,0.3); }
    .row.bronze { background: rgba(205,127,50,0.15); border: 1px solid rgba(205,127,50,0.3); }
    .rank { font-size: 1.4rem; width: 36px; text-align: center; flex-shrink: 0; }
    .name { flex: 1; font-size: 1.1rem; font-weight: 700; }
    .score { font-size: 1.1rem; font-weight: 800; color: #ffe566; }
    .you-tag {
      background: #ffe566; color: #3b0f8c; font-size: 0.7rem;
      font-weight: 800; border-radius: 20px; padding: 2px 8px;
    }
  </style>
</head>
<body>
  <div id="header">
    <a id="back-btn" href="index.html">&#8592; Home</a>
    <h1>&#127942; Leaderboard</h1>
    <div style="width:80px"></div>
  </div>

  <div class="card" id="board"></div>

  <script>
    var medals = ["&#127947;", "&#129352;", "&#129353;"];
    var medalClass = ["gold", "silver", "bronze"];

    function render() {
      var saved = localStorage.getItem("mathGameAllScores");
      var scores = saved ? JSON.parse(saved) : {};
      var currentPlayer = localStorage.getItem("mathGameCurrentPlayer") || "";

      var entries = Object.keys(scores).map(function(name) {
        return { name: name, score: scores[name] };
      });
      entries.sort(function(a, b) { return b.score - a.score; });

      var board = document.getElementById("board");

      if (entries.length === 0) {
        board.innerHTML = '<p class="empty">No scores yet. Be the first to play!</p>';
        return;
      }

      board.innerHTML = "";
      entries.forEach(function(entry, i) {
        var row = document.createElement("div");
        row.className = "row" + (i < 3 ? " " + medalClass[i] : "");

        var rankEl = document.createElement("div");
        rankEl.className = "rank";
        rankEl.innerHTML = i < 3 ? medals[i] : (i + 1);

        var nameEl = document.createElement("div");
        nameEl.className = "name";
        nameEl.textContent = entry.name;

        var scoreEl = document.createElement("div");
        scoreEl.className = "score";
        scoreEl.textContent = entry.score.toLocaleString() + " pts";

        row.appendChild(rankEl);
        row.appendChild(nameEl);

        if (entry.name === currentPlayer) {
          var tag = document.createElement("span");
          tag.className = "you-tag";
          tag.textContent = "YOU";
          row.appendChild(tag);
        }

        row.appendChild(scoreEl);
        board.appendChild(row);
      });
    }

    render();
  </script>
</body>
</html>

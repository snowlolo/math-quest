<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HW Helper - Leaderboard</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="theme.css" />
  <script src="theme.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
      color: var(--text);
    }
    #header {
      width: 100%; max-width: 600px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 28px;
    }
    #back-btn {
      background: transparent; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-secondary); font-family: inherit;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      padding: 7px 14px; cursor: pointer; text-decoration: none;
    }
    #back-btn:hover { border-color: var(--blue); color: var(--blue); }
    h1 { font-size: 1.6rem; font-weight: 900; color: var(--text); letter-spacing: -1px; }
    #reset-btn {
      background: transparent; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-quaternary); font-family: inherit;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      padding: 7px 14px; cursor: pointer; width: 80px;
      transition: border-color 0.12s, color 0.12s;
    }
    #reset-btn:hover { border-color: #c0392b; color: #c0392b; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 600px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    }
    .empty {
      text-align: center; color: var(--text-tertiary);
      font-size: 0.9rem; padding: 40px 0; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .row {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 16px; border-radius: 10px; margin-bottom: 8px;
      border: 1px solid transparent;
    }
    .row:hover { background: var(--surface-raised); }
    .row.gold   { border-color: var(--accent); background: var(--accent-muted); }
    .row.silver { border-color: rgba(160, 160, 172, 0.35); }
    .row.bronze { border-color: rgba(160, 110, 60, 0.3); }
    .rank { font-size: 0.85rem; font-weight: 900; width: 28px; text-align: center; flex-shrink: 0; color: var(--text-tertiary); }
    .row.gold   .rank { color: var(--accent); font-size: 1rem; }
    .row.silver .rank { color: #a0a0ac; }
    .row.bronze .rank { color: #a06e3c; }
    .name { flex: 1; font-size: 1rem; font-weight: 700; color: var(--text-dim); }
    .row.gold .name { color: var(--text-dim); }
    .score { font-size: 1rem; font-weight: 800; color: var(--text-tertiary); }
    .row.gold   .score { color: var(--accent); }
    .row.silver .score { color: var(--text-secondary); }
    .you-tag {
      background: var(--blue); color: #ffffff; font-size: 0.65rem;
      font-weight: 800; border-radius: 4px; padding: 2px 7px;
      letter-spacing: 1px; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="header">
    <a id="back-btn" href="home.html">Home</a>
    <h1>Leaderboard</h1>
    <button id="reset-btn" onclick="resetBoard()">Reset</button>
  </div>

  <div class="card" id="board"></div>

  <script>
    var medals = ["1", "2", "3"];
    var medalClass = ["gold", "silver", "bronze"];

    function render() {
      var saved = localStorage.getItem("mathGameAllScores");
      var scores = saved ? JSON.parse(saved) : {};
      var currentPlayer = localStorage.getItem("mathGameCurrentPlayer") || "";

      var entries = Object.keys(scores).map(function(name) {
        return { name: name, score: scores[name] };
      });
      entries.sort(function(a, b) { return b.score - a.score; });

      var board = document.getElementById("board");

      if (entries.length === 0) {
        board.innerHTML = '<p class="empty">No scores yet. Be the first to play!</p>';
        return;
      }

      board.innerHTML = "";
      entries.forEach(function(entry, i) {
        var row = document.createElement("div");
        row.className = "row" + (i < 3 ? " " + medalClass[i] : "");

        var rankEl = document.createElement("div");
        rankEl.className = "rank";
        rankEl.innerHTML = i < 3 ? medals[i] : (i + 1);

        var nameEl = document.createElement("div");
        nameEl.className = "name";
        nameEl.textContent = entry.name;

        var scoreEl = document.createElement("div");
        scoreEl.className = "score";
        scoreEl.textContent = entry.score.toLocaleString() + " pts";

        row.appendChild(rankEl);
        row.appendChild(nameEl);

        if (entry.name === currentPlayer) {
          var tag = document.createElement("span");
          tag.className = "you-tag";
          tag.textContent = "YOU";
          row.appendChild(tag);
        }

        row.appendChild(scoreEl);
        board.appendChild(row);
      });
    }

    function resetBoard() {
      if (confirm("Clear all scores? This can't be undone.")) {
        localStorage.removeItem("mathGameAllScores");
        render();
      }
    }

    render();
  </script>
</body>
</html>
